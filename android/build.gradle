buildscript {
    ext.safeExtGet = { prop, fallback ->
        rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.2.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.20")
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace "com.rnusbcamera"
    compileSdkVersion safeExtGet('compileSdkVersion', 34)

    defaultConfig {
        minSdkVersion safeExtGet('minSdkVersion', 24)
        targetSdkVersion safeExtGet('targetSdkVersion', 34)
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

// Inject local Maven repo into root project so AUSBC dependencies resolve in any consumer
def ausbcMavenRepo = "$projectDir/maven-repo"
rootProject.allprojects {
    repositories {
        maven {
            url ausbcMavenRepo
            content {
                includeGroup "com.github.ernestp"
            }
        }
    }
}

repositories {
    google()
    mavenCentral()
    maven { url "https://jitpack.io" }
}

dependencies {
    //noinspection GradleDynamicVersion
    implementation "com.facebook.react:react-android:+"

    // AUSBC USB Camera library (local Maven repo with Android 10+ MediaStore fix)
    implementation "com.github.ernestp:libausbc:3.4.5"
    implementation "com.github.ernestp:libuvc:3.4.5"
    implementation "com.github.ernestp:libnative:3.4.5"
}
