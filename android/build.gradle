buildscript {
    ext.safeExtGet = { prop, fallback ->
        rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.2.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.20")
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace "com.rnusbcamera"
    compileSdkVersion safeExtGet('compileSdkVersion', 34)

    defaultConfig {
        minSdkVersion safeExtGet('minSdkVersion', 24)
        targetSdkVersion safeExtGet('targetSdkVersion', 34)
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

// Inject AUSBC local Maven repo so dependencies resolve in any consumer project
def ausbcMavenDir = new File(projectDir, "maven-repo")
if (!ausbcMavenDir.exists()) {
    throw new GradleException("[rn-usb-camera] Missing android/maven-repo directory. " +
        "Please reinstall the rn-usb-camera package.")
}
def ausbcMavenUrl = ausbcMavenDir.toURI()

// Add to all projects (covers standard RN project setups)
rootProject.allprojects { p ->
    p.repositories {
        maven { url ausbcMavenUrl }
    }
}

// Belt & suspenders: also inject after all projects are evaluated
// This handles cases where :app is evaluated before :rn-usb-camera
project.gradle.projectsEvaluated {
    rootProject.allprojects { p ->
        p.repositories {
            maven { url ausbcMavenUrl }
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    //noinspection GradleDynamicVersion
    implementation "com.facebook.react:react-android:+"

    // AUSBC USB Camera library (bundled local Maven repo with Android 10+ MediaStore fix)
    implementation "com.rnusbcamera.ausbc:libausbc:3.4.5"
    implementation "com.rnusbcamera.ausbc:libuvc:3.4.5"
    implementation "com.rnusbcamera.ausbc:libnative:3.4.5"
}
